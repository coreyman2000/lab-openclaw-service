---
- name: Provision OpenClaw Tenant VM
  hosts: proxmox_hosts[0]  # Run on first Proxmox host
  gather_facts: false
  vars_prompt:
    - name: tenant_name
      prompt: "Enter tenant name (e.g., team-alpha)"
      private: false
    
    - name: tenant_tier
      prompt: "Select tier (basic/standard/premium)"
      private: false
      default: "standard"
    
    - name: tenant_vlan
      prompt: "VLAN ID (optional, press Enter for none)"
      private: false
      default: ""
    
    - name: openclaw_instances
      prompt: "Number of OpenClaw instances"
      private: false
      default: "5"

  vars:
    vm_id_base: 9000
    vm_network_base: "10.0.20"

  tasks:
    - name: Generate unique VM ID
      ansible.builtin.set_fact:
        vm_id: "{{ vm_id_base + (tenant_name | hash | int % 1000) }}"
        vm_ip: "{{ vm_network_base }}.{{ (tenant_name | hash | int % 250) + 2 }}"

    - name: Display provisioning plan
      ansible.builtin.debug:
        msg: |
          Provisioning Plan for Tenant: {{ tenant_name }}
          =========================================
          VM ID: {{ vm_id }}
          IP: {{ vm_ip }}
          Tier: {{ tenant_tier }}
          OpenClaw Instances: {{ openclaw_instances }}
          VLAN: {{ tenant_vlan | default('None') }}

    - name: Clone VM from template
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "root@pam"
        api_token_id: "{{ proxmox_token_id | default(omit) }}"
        api_token_secret: "{{ proxmox_token_secret | default(omit) }}"
        node: "{{ inventory_hostname }}"
        name: "openclaw-{{ tenant_name }}"
        vmid: "{{ vm_id }}"
        clone: "{{ tenant_vm_template | default('ubuntu-24.04-cloudimg') }}"
        full: true
        storage: "{{ tenant_vm_storage | default('local-zfs') }}"
        timeout: 300
      register: vm_clone

    - name: Configure VM resources
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "root@pam"
        node: "{{ inventory_hostname }}"
        name: "openclaw-{{ tenant_name }}"
        vmid: "{{ vm_id }}"
        cores: "{{ tenant_tiers[tenant_tier].cores }}"
        memory: "{{ tenant_tiers[tenant_tier].memory }}"
        cpu: "host"
        net:
          net0: "virtio,bridge={{ tenant_vm_network_bridge | default('vmbr0') }}{% if tenant_vlan | length > 0 %},tag={{ tenant_vlan }}{% endif %}"
        ipconfig:
          ipconfig0: "ip={{ vm_ip }}/24,gw={{ tenant_vm_gateway | default('10.0.20.1') }}"
        citype: "nocloud"
        cicustom: |
          meta-data: |
            instance-id: openclaw-{{ tenant_name }}
            local-hostname: openclaw-{{ tenant_name }}
          user-data: |
            #cloud-config
            hostname: openclaw-{{ tenant_name }}
            manage_etc_hosts: true
            users:
              - name: openclaw
                sudo: ALL=(ALL) NOPASSWD:ALL
                shell: /bin/bash
                ssh_authorized_keys:
                  - {{ lookup('file', '~/.ssh/id_rsa.pub') }}
            package_update: true
            packages:
              - docker.io
              - docker-compose-plugin
              - python3-pip
              - qemu-guest-agent
            runcmd:
              - systemctl enable --now docker
              - systemctl enable --now qemu-guest-agent
              - usermod -aG docker openclaw
        update: true

    - name: Start VM
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "root@pam"
        node: "{{ inventory_hostname }}"
        name: "openclaw-{{ tenant_name }}"
        vmid: "{{ vm_id }}"
        state: started

    - name: Wait for VM to be reachable
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        timeout: 300
        delay: 10

    - name: Add VM to inventory
      ansible.builtin.add_host:
        name: "openclaw-{{ tenant_name }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: "openclaw"
        tenant_name: "{{ tenant_name }}"
        tenant_tier: "{{ tenant_tier }}"
        openclaw_instances: "{{ openclaw_instances | int }}"
        vm_id: "{{ vm_id }}"
        groups:
          - tenant_vms
          - just_provisioned

- name: Configure Tenant VM
  hosts: just_provisioned
  become: true
  gather_facts: true

  tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.wait_for:
        path: /var/lib/cloud/instance/boot-finished
        timeout: 300
        delay: 5

    - name: Create OpenClaw base directory
      ansible.builtin.file:
        path: "/opt/openclaw"
        state: directory
        mode: '0755'
        owner: "openclaw"
        group: "openclaw"

    - name: Create data directories for each instance
      ansible.builtin.file:
        path: "/opt/openclaw/instance-{{ item }}"
        state: directory
        mode: '0755'
        owner: "openclaw"
        group: "openclaw"
      loop: "{{ range(1, openclaw_instances | int + 1) | list }}"

    - name: Generate OpenClaw Docker Compose file
      ansible.builtin.template:
        src: "docker-compose.yml.j2"
        dest: "/opt/openclaw/docker-compose.yml"
        mode: '0644'
        owner: "openclaw"
        group: "openclaw"

    - name: Generate OpenClaw configuration for each instance
      ansible.builtin.template:
        src: "openclaw-config.yml.j2"
        dest: "/opt/openclaw/instance-{{ item }}/config.yaml"
        mode: '0644'
        owner: "openclaw"
        group: "openclaw"
      loop: "{{ range(1, openclaw_instances | int + 1) | list }}"

    - name: Pull OpenClaw image
      community.docker.docker_image:
        name: "{{ openclaw_image | default('ghcr.io/openclaw/openclaw:latest') }}"
        source: pull
        timeout: 300

    - name: Start OpenClaw services
      community.docker.docker_compose_v2:
        project_src: "/opt/openclaw"
        state: present
        wait: true
        wait_timeout: 120

    - name: Get OpenClaw container status
      ansible.builtin.shell: |
        docker compose -f /opt/openclaw/docker-compose.yml ps --format json
      register: container_status
      changed_when: false

    - name: Display provisioning summary
      ansible.builtin.debug:
        msg: |
          Tenant VM Provisioned Successfully!
          ==================================
          
          Tenant: {{ tenant_name }}
          VM ID: {{ vm_id }}
          IP Address: {{ ansible_host }}
          
          OpenClaw Instances:
          {% for i in range(1, openclaw_instances | int + 1) %}
          - Instance {{ i }}: http://{{ ansible_host }}:{{ 3000 + i - 1 }}
          {% endfor %}
          
          SSH Access: openclaw@{{ ansible_host }}
          
          Configuration files: /opt/openclaw/
          
          Next steps:
          1. Configure firewall rules for tenant access
          2. Set up reverse proxy if needed
          3. Provide access credentials to tenant team

- name: Update service inventory
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Save tenant metadata
      ansible.builtin.template:
        src: "tenant-metadata.yml.j2"
        dest: "{{ playbook_dir }}/../inventory/host_vars/openclaw-{{ tenant_name }}.yml"
        mode: '0644'
      vars:
        tenant_name: "{{ hostvars['openclaw-' + tenant_name]['tenant_name'] }}"
        tenant_tier: "{{ hostvars['openclaw-' + tenant_name]['tenant_tier'] }}"
        vm_id: "{{ hostvars['openclaw-' + tenant_name]['vm_id'] }}"
        vm_ip: "{{ hostvars['openclaw-' + tenant_name]['ansible_host'] }}"
        openclaw_instances: "{{ hostvars['openclaw-' + tenant_name]['openclaw_instances'] }}"

    - name: Add to inventory
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../inventory/hosts.yml"
        regexp: "^  openclaw-{{ tenant_name }}:"
        line: "  openclaw-{{ tenant_name }}:"
        insertafter: "tenant_vms:"
      delegate_to: localhost
      vars:
        tenant_name: "{{ hostvars['openclaw-' + tenant_name]['tenant_name'] }}"