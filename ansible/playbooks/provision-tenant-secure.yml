---
- name: Provision OpenClaw Tenant VM (Secure Gateway)
  hosts: proxmox_hosts[0]
  gather_facts: false
  vars_prompt:
    - name: tenant_name
      prompt: "Enter tenant name (e.g., team-alpha)"
      private: false
    
    - name: tenant_tier
      prompt: "Select tier (basic/standard/premium)"
      private: false
      default: "standard"
    
    - name: tenant_vlan
      prompt: "VLAN ID (optional, press Enter for none)"
      private: false
      default: ""
    
    - name: openclaw_instances
      prompt: "Number of OpenClaw instances"
      private: false
      default: "5"

  vars:
    vm_id_base: 9000
    vm_network_base: "10.0.20"

  tasks:
    - name: Generate unique VM ID
      ansible.builtin.set_fact:
        vm_id: "{{ vm_id_base + (tenant_name | hash | int % 1000) }}"
        vm_ip: "{{ vm_network_base }}.{{ (tenant_name | hash | int % 250) + 2 }}"

    - name: Load tenant API key from gateway
      ansible.builtin.set_fact:
        tenant_api_key: "{{ lookup('file', playbook_dir + '/../files/' + tenant_name + '-api-key.txt') | default('') }}"
      ignore_errors: true

    - name: Display provisioning plan
      ansible.builtin.debug:
        msg: |
          Provisioning Plan for Tenant: {{ tenant_name }}
          =========================================
          VM ID: {{ vm_id }}
          IP: {{ vm_ip }}
          Tier: {{ tenant_tier }}
          OpenClaw Instances: {{ openclaw_instances }}
          VLAN: {{ tenant_vlan | default('None') }}
          API Key: {{ tenant_api_key | default('Will be generated') }}

    - name: Clone VM from template
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "root@pam"
        api_token_id: "{{ proxmox_token_id | default(omit) }}"
        api_token_secret: "{{ proxmox_token_secret | default(omit) }}"
        node: "{{ inventory_hostname }}"
        name: "openclaw-{{ tenant_name }}"
        vmid: "{{ vm_id }}"
        clone: "{{ tenant_vm_template | default('ubuntu-24.04-cloudimg') }}"
        full: true
        storage: "{{ tenant_vm_storage | default('local-zfs') }}"
        timeout: 300
      register: vm_clone

    - name: Configure VM resources
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "root@pam"
        node: "{{ inventory_hostname }}"
        name: "openclaw-{{ tenant_name }}"
        vmid: "{{ vm_id }}"
        cores: "{{ tenant_tiers[tenant_tier].cores }}"
        memory: "{{ tenant_tiers[tenant_tier].memory }}"
        cpu: "host"
        net:
          net0: "virtio,bridge={{ tenant_vm_network_bridge | default('vmbr0') }}{% if tenant_vlan | length > 0 %},tag={{ tenant_vlan }}{% endif %}"
        ipconfig:
          ipconfig0: "ip={{ vm_ip }}/24,gw={{ tenant_vm_gateway | default('10.0.20.1') }}"
        citype: "nocloud"
        cicustom: |
          meta-data: |
            instance-id: openclaw-{{ tenant_name }}
            local-hostname: openclaw-{{ tenant_name }}
          user-data: |
            #cloud-config
            hostname: openclaw-{{ tenant_name }}
            manage_etc_hosts: true
            users:
              - name: openclaw
                sudo: ALL=(ALL) NOPASSWD:ALL
                shell: /bin/bash
                ssh_authorized_keys:
                  - {{ lookup('file', '~/.ssh/id_rsa.pub') }}
            package_update: true
            packages:
              - docker.io
              - docker-compose-plugin
              - python3-pip
              - qemu-guest-agent
            write_files:
              - path: /opt/openclaw/.tenant-api-key
                content: {{ tenant_api_key | default('') }}
                owner: openclaw:openclaw
                permissions: '0600'
            runcmd:
              - systemctl enable --now docker
              - systemctl enable --now qemu-guest-agent
              - usermod -aG docker openclaw
        update: true

    - name: Start VM
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "root@pam"
        node: "{{ inventory_hostname }}"
        name: "openclaw-{{ tenant_name }}"
        vmid: "{{ vm_id }}"
        state: started

    - name: Wait for VM to be reachable
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        timeout: 300
        delay: 10

    - name: Add VM to inventory
      ansible.builtin.add_host:
        name: "openclaw-{{ tenant_name }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: "openclaw"
        tenant_name: "{{ tenant_name }}"
        tenant_tier: "{{ tenant_tier }}"
        openclaw_instances: "{{ openclaw_instances | int }}"
        vm_id: "{{ vm_id }}"
        tenant_api_key: "{{ tenant_api_key | default('') }}"
        groups:
          - tenant_vms
          - just_provisioned

- name: Configure Tenant VM with Secure Gateway
  hosts: just_provisioned
  become: true
  gather_facts: true

  vars:
    # Use secure gateway endpoints (port 11435) instead of direct Ollama
    ollama_secure_endpoints:
      - "http://10.0.10.11:11435"  # Secure gateway on GPU node 1
      - "http://10.0.10.12:11435"  # Secure gateway on GPU node 2

  tasks:
    - name: Wait for cloud-init to complete
      ansible.builtin.wait_for:
        path: /var/lib/cloud/instance/boot-finished
        timeout: 300
        delay: 5

    - name: Read tenant API key
      ansible.builtin.slurp:
        src: /opt/openclaw/.tenant-api-key
      register: api_key_file
      ignore_errors: true

    - name: Set API key fact
      ansible.builtin.set_fact:
        tenant_api_key: "{{ api_key_file['content'] | b64decode | default('') }}"
      when: api_key_file is succeeded

    - name: Fail if no API key
      ansible.builtin.fail:
        msg: "No API key found for tenant {{ tenant_name }}. Run deploy-ollama-secure-gateway.yml first."
      when: tenant_api_key | default('') | length == 0

    - name: Create OpenClaw base directory
      ansible.builtin.file:
        path: "/opt/openclaw"
        state: directory
        mode: '0755'
        owner: "openclaw"
        group: "openclaw"

    - name: Create data directories for each instance
      ansible.builtin.file:
        path: "/opt/openclaw/instance-{{ item }}"
        state: directory
        mode: '0755'
        owner: "openclaw"
        group: "openclaw"
      loop: "{{ range(1, openclaw_instances | int + 1) | list }}"

    - name: Generate OpenClaw Docker Compose file
      ansible.builtin.template:
        src: "docker-compose.yml.j2"
        dest: "/opt/openclaw/docker-compose.yml"
        mode: '0644'
        owner: "openclaw"
        group: "openclaw"

    - name: Generate OpenClaw configuration for each instance
      ansible.builtin.template:
        src: "openclaw-config-secure.yml.j2"
        dest: "/opt/openclaw/instance-{{ item }}/config.yaml"
        mode: '0644'
        owner: "openclaw"
        group: "openclaw"
      loop: "{{ range(1, openclaw_instances | int + 1) | list }}"
      vars:
        instance_num: "{{ item }}"

    - name: Pull OpenClaw image
      community.docker.docker_image:
        name: "{{ openclaw_image | default('ghcr.io/openclaw/openclaw:latest') }}"
        source: pull
        timeout: 300

    - name: Start OpenClaw services
      community.docker.docker_compose_v2:
        project_src: "/opt/openclaw"
        state: present
        wait: true
        wait_timeout: 120

    - name: Verify OpenClaw can connect to secure gateway
      ansible.builtin.shell: |
        # Test with the API key
        curl -s -H "X-API-Key: {{ tenant_api_key }}" \
          {{ ollama_secure_endpoints | first }}/api/tags | head -20
      register: ollama_test
      changed_when: false
      ignore_errors: true

    - name: Display test result
      ansible.builtin.debug:
        msg: |
          {% if ollama_test.rc == 0 %}
          ✅ OpenClaw successfully connected to secure Ollama gateway
          {% else %}
          ⚠️  Connection test failed - check gateway configuration
          {% endif %}

    - name: Display provisioning summary
      ansible.builtin.debug:
        msg: |
          🔐 Secure Tenant VM Provisioned Successfully!
          =============================================
          
          Tenant: {{ tenant_name }}
          VM ID: {{ vm_id }}
          IP Address: {{ ansible_host }}
          
          🔑 API Key: {{ tenant_api_key[:8] }}... (stored in VM at /opt/openclaw/.tenant-api-key)
          
          OpenClaw Instances (Secure):
          {% for i in range(1, openclaw_instances | int + 1) %}
          - Instance {{ i }}: http://{{ ansible_host }}:{{ 3000 + i - 1 }}
          {% endfor %}
          
          Secure Ollama Endpoints:
          {% for ep in ollama_secure_endpoints %}
          - {{ ep }}
          {% endfor %}
          
          SSH Access: openclaw@{{ ansible_host }}
          
          Configuration files: /opt/openclaw/
          
          Next steps:
          1. ✅ Secure gateway blocks direct Ollama access
          2. ✅ API key authentication required
          3. ✅ Rate limiting per tenant enabled
          4. ✅ Connection verified
