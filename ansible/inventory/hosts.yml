---
# Proxmox Lab Inventory

proxmox_hosts:
  hosts:
    pve-gpu-01:
      ansible_host: 10.0.10.11
      gpu_node: true
      gpus:
        - nvidia_l40_0
        - nvidia_l40_1
    pve-gpu-02:
      ansible_host: 10.0.10.12
      gpu_node: true
      gpus:
        - nvidia_l40_2
        - nvidia_l40_3
    pve-compute-01:
      ansible_host: 10.0.10.21
      gpu_node: false
    pve-compute-02:
      ansible_host: 10.0.10.22
      gpu_node: false
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3

ollama_backends:
  children:
    proxmox_hosts:
      vars:
        gpu_node: true

tenant_vms:
  # Dynamically populated by provisioning playbook
  hosts: {}

# Service endpoints (populated after Ollama deployment)
ollama_endpoints: []
# Example after deployment:
# ollama_endpoints:
#   - http://10.0.10.11:11434
#   - http://10.0.10.12:11434